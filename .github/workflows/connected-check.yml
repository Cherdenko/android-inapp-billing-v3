name: Connected Check

on:
  push:
    branches:
      - "*"

  pull_request:
    branches:
      - master

jobs:
  # Fast feedback job. Compiles both modules and runs the JVM-only checks on a
  # cheap Ubuntu runner, so compile errors and failing unit tests surface in a
  # couple of minutes instead of after a full emulator cycle. The emulator job
  # below only starts once this passes.
  build:
    # put [skip ci] into the commit message if you don't want to run this workflow

    runs-on: ubuntu-latest

    timeout-minutes: 15

    steps:
      - name: Cancel previous runs
        uses: styfle/cancel-workflow-action@0.13.1
        with:
          access_token: ${{ github.token }}

      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up build properties
        run: |
          # Raw value, NOT pre-quoted: sample/build.gradle wraps this in quotes
          # itself when generating the BuildConfig field. Writing `licenceKey=""`
          # here produced `""""` in BuildConfig.java, which javac rejects as a
          # malformed text block.
          echo 'licenceKey=' > local.properties
          echo 'android.useAndroidX=true' >> gradle.properties
          echo 'android.enableJetifier=true' >> gradle.properties

      - name: Assemble and run JVM checks
        run: ./gradlew assembleDebug :library:test :library:checkstyle

  run-connected-checks:
    # Instrumented tests on a real emulator. Only worth spending emulator time
    # on a tree that already compiles, hence `needs: build`.
    needs: build

    runs-on: macos-15-intel

    # Emulator boot alone eats most of the budget on this runner; 15 minutes
    # was not enough to reach the tests and the job was killed mid-run.
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up build properties
        run: |
          echo 'licenceKey=' > local.properties
          echo 'android.useAndroidX=true' >> gradle.properties
          echo 'android.enableJetifier=true' >> gradle.properties

      - name: Run connectedCheck
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          script: ./gradlew connectedCheck
